<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clinical Onboarding Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --align-blue: #0056A3;
      --align-light-blue: #E6F2FF;
      --completed-green: #4CAF50;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f7fa;
      padding-bottom: 60px;
    }

    .header {
      background: linear-gradient(135deg, var(--align-blue) 0%, #003d7a 100%);
      color: white;
      padding: 20px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Progress Dashboard */
    .dashboard {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--card-shadow);
    }

    .dashboard h2 {
      font-size: 20px;
      color: var(--align-blue);
      margin-bottom: 20px;
    }

    .progress-section {
      margin-bottom: 24px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
      color: #333;
      font-weight: 500;
    }

    .progress-bar-container {
      width: 100%;
      height: 24px;
      background: #e9ecef;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--align-blue) 0%, #0076d6 100%);
      border-radius: 12px;
      transition: width 0.4s ease;
      position: relative;
    }

    .progress-bar.completed {
      background: linear-gradient(90deg, var(--completed-green) 0%, #66BB6A 100%);
    }

    .progress-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 12px;
      font-weight: 600;
    }

    .sub-progress {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .week-progress-card {
      background: var(--align-light-blue);
      padding: 12px;
      border-radius: 8px;
    }

    .week-progress-card h4 {
      font-size: 13px;
      color: var(--align-blue);
      margin-bottom: 8px;
    }

    .mini-progress {
      height: 8px;
      background: white;
      border-radius: 4px;
      overflow: hidden;
    }

    .mini-progress-bar {
      height: 100%;
      background: var(--align-blue);
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .tab {
      background: white;
      border: 2px solid #e0e0e0;
      padding: 12px 24px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      color: #666;
      transition: all 0.3s ease;
      white-space: nowrap;
      box-shadow: var(--shadow);
    }

    .tab.active {
      background: var(--align-blue);
      color: white;
      border-color: var(--align-blue);
    }

    /* Week Picker */
    .week-picker {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding: 12px;
      background: white;
      border-radius: 12px;
      box-shadow: var(--shadow);
    }

    .week-btn {
      background: white;
      border: 2px solid var(--align-blue);
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      color: var(--align-blue);
      transition: all 0.3s ease;
      white-space: nowrap;
      min-width: 80px;
      text-align: center;
    }

    .week-btn.active {
      background: var(--align-blue);
      color: white;
    }

    /* Task Tables */
    .task-section {
      margin-bottom: 24px;
    }

    .task-section h3 {
      background: var(--align-blue);
      color: white;
      padding: 12px 16px;
      border-radius: 12px 12px 0 0;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .task-list {
      background: white;
      border-radius: 0 0 12px 12px;
      box-shadow: var(--card-shadow);
      overflow: hidden;
    }

    .task-card {
      padding: 16px;
      border-bottom: 1px solid #f0f0f0;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .task-card:last-child {
      border-bottom: none;
    }

    .task-card:hover {
      background: #fafafa;
    }

    .task-card.completed {
      background: #f1f8f4;
    }

    .task-content {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .checkbox {
      width: 24px;
      height: 24px;
      min-width: 24px;
      border: 2px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
      position: relative;
      transition: all 0.3s ease;
    }

    .checkbox.checked {
      background: var(--completed-green);
      border-color: var(--completed-green);
    }

    .checkbox.checked::after {
      content: '✓';
      position: absolute;
      color: white;
      font-size: 18px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .task-info {
      flex: 1;
    }

    .task-name {
      font-size: 15px;
      color: #333;
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .task-timestamp {
      font-size: 12px;
      color: var(--completed-green);
      font-weight: 600;
    }

    .content-section {
      display: none;
    }

    .content-section.active {
      display: block;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 12px;
      }

      .header h1 {
        font-size: 20px;
      }

      .tab {
        padding: 10px 16px;
        font-size: 14px;
      }

      .dashboard {
        padding: 16px;
      }

      .sub-progress {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🦷 Clinical Onboarding Tracker</h1>
    <p>Your 90-Day Learning Journey</p>
  </div>

  <div class="container">
    <!-- Progress Dashboard -->
    <div class="dashboard">
      <h2>📊 Progress Dashboard</h2>
      <!-- Progress bars will go here -->
      <!-- Overall Progress -->
      <div class="progress-section">
        <div class="progress-label">
          <span><strong>Overall Completion</strong></span>
          <span id="overall-percent">0%</span>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar" id="overall-progress" style="width: 0%">
            <div class="progress-text">0%</div>
          </div>
        </div>
      </div>

      <!-- Filter Progress -->
      <div class="progress-section">
        <div class="progress-label">
          <span><strong>Filtered Progress</strong></span>
          <span id="filtered-percent">0%</span>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar" id="filtered-progress" style="width: 0%">
            <div class="progress-text">0%</div>
          </div>
        </div>
      </div>

      <!-- Week Progress Cards -->
      <div class="sub-progress" id="week-progress-cards"></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('pre-boarding')">Pre-boarding</div>
      <div class="tab" onclick="switchTab('month-1')">Month 1</div>
      <div class="tab" onclick="switchTab('month-2')">Month 2</div>
      <div class="tab" onclick="switchTab('month-3')">Month 3</div>
    </div>

    <!-- Content Sections -->
    <div id="pre-boarding" class="content-section active">
      <div class="task-section">
        <h3>📋 Pre-boarding Tasks</h3>
        <div class="task-list" id="pre-boarding-tasks"></div>
      </div>
    </div>

    <div id="month-1" class="content-section">
      <div class="week-picker" id="month-1-weeks"></div>
      <div id="month-1-content"></div>
    </div>

    <div id="month-2" class="content-section">
      <div class="week-picker" id="month-2-weeks"></div>
      <div id="month-2-content"></div>
    </div>

    <div id="month-3" class="content-section">
      <div class="week-picker" id="month-3-weeks"></div>
      <div id="month-3-content"></div>
    </div>
  </div>

  <!-- Sync Status Indicator -->
  <div class="sync-status" id="sync-status">
    <div class="sync-spinner"></div>
    <span>Syncing to Google Sheets...</span>
  </div>

  <script>
    // JavaScript logic starts here
    const taskData = {
      'pre-boarding': {
        invisalign: [
          'Save your own copy of onboarding materials',
          'Share checklist with manager and local champion',
          'Review welcome letter and onboarding overview',
          'Set up access to learning resources'
        ],
        itero: []
      },
      'month-1': {
        1: {
          invisalign: [
            'Meeting with manager',
            'Clinical Systems Landscape: Tools & Platforms',
            'Biomechanics in Orthodontics: Recorded Expert Session'
          ],
          itero: [
            'Dental diploma',
            'Dental Diploma Topics: Q&A and Clarification Session'
          ]
        },
        2: {
          invisalign: [],
          itero: [
            'Introduction to iTero customer training journey',
            'Lumina Mastering iTero webinar part 1',
            'Lumina Mastering iTero webinar part 2',
            'Lumina Mastering iTero webinar part 3',
            'Lumina experience workshop - Part 1 - theory',
            'Lumina experience workshop - Part 2 - hands-on',
            'Shadow Lumina ortho training (1)',
            'Shadow Lumina ortho training (2)',
            'Lumina self-reflection assessment',
            'Lumina experience workshop - Part 3 - Training and insights'
          ]
        },
        3: {
          invisalign: [
            'Deep dive on SmartForce features (thresholds, max velocity, hierarchy, G series)',
            'E-learning Module 2',
            'CCSE module',
            'Deep dive on CCSE (templates and Flex Rx)',
            'Workshop on Flex Rx and template editor',
            'CC pro interface, in-face visualization and smile video modules',
            'Use of 3D controls, CC live update and plan editor module',
            'Workshop on 3D controls and plan editor',
            'Warranty, AA process and clinical hold',
            'Video on attachment placement and IPR'
          ],
          itero: ['CBCT integration module']
        },
        4: {
          invisalign: [
            'Crowding',
            'Spacing',
            'Open bite',
            'Deep bite',
            'AP correction Class II',
            'AP correction Class III'
          ],
          itero: [
            'Element Mastering iTero webinar part 1',
            'Element Mastering iTero webinar part 2',
            'Element Mastering iTero webinar part 3'
          ]
        }
      },
      'month-2': {
        5: {
          invisalign: [
            'Lower incisor extraction',
            'First premolar extraction',
            'Invisalign Smile architect module',
            'MA module',
            'IF session',
            'IPE TTT recording',
            'Session on tx options for growing patients',
            'Vivera module',
            'Essentials and iGo (if needed)'
          ],
          itero: []
        },
        6: {
          invisalign: [
            'Other tools - myInvisalign app, Invisalign practice app, virtual care, SmileView, smile video, etc.',
            'Patient communication webinar'
          ],
          itero: [
            'Product: Installation and Hardware',
            'Product: Scanning and Software',
            'iTero ortho WF & tools (AOHS, NIRI and Demo cases)',
            'iTero ortho WF & tools (Align Xray insight)',
            'iTero ortho WF & tools (iosim Pro)',
            'iTero ortho WF & tools (iosim Classic)',
            'iTero ortho WF & tools (PA)',
            'iTero ortho WF & tools (MIDC)',
            'Additional topic: IPE, iGO & Q&A',
            'Formulate iTero training 1'
          ]
        },
        7: {
          invisalign: [
            'Workshop on attachment placement and IPR',
            'Monitoring and troubleshooting',
            'Shadowing during CC review',
            'Shadowing during CC review',
            'Shadowing during CC review'
          ],
          itero: [
            'Ortho self-practice',
            'Ortho dry-run',
            'Ortho written assessment',
            'Ortho role play - Lumina',
            'Ortho role play - Element'
          ]
        },
        8: {
          invisalign: [
            'Shadowing during CC review',
            'Shadowing during CC review',
            'Shadowing during CC review',
            'Shadowing during CC review',
            'Shadowing during CC review'
          ],
          itero: [
            'E-learning Module 3 - Resto basic: Crown, veneer',
            'E-learning Module 4 - Resto basic: Crown, bridge, dentures',
            'E-learning Module 5 - Resto: Implant',
            'Shadow Lumina resto training',
            'Shadow Lumina resto training',
            'Mastering Lumina webinar Resto part 1',
            'Mastering Lumina webinar Resto part 2',
            'Mastering Lumina webinar Resto part 3',
            'iTero resto WF & tools (Basic - Lumina)',
            'iTero resto WF & tools (Advanced - Denture & All-on-X)'
          ]
        }
      },
      'month-3': {
        9: {
          invisalign: [
            'Shadowing during CC review',
            'Shadowing during CC review',
            'Shadowing during CC review',
            'Shadowing during CC review',
            'Shadowing during CC review'
          ],
          itero: [
            'Mastering Element webinar Resto part 1',
            'Mastering Element webinar Resto part 2',
            'Mastering Element webinar Resto part 3',
            'iTero resto WF & tools (Basic - Element)',
            'iTero resto WF & tools (Advanced - Denture & All-on-X)',
            'Formulate iTero training 2'
          ]
        },
        10: {
          invisalign: [
            'Role play CC review',
            'Role play CC review',
            'Role play CC review',
            'Role play CC review',
            'Role play CC review'
          ],
          itero: [
            'Resto self-practice',
            'Resto dry run',
            'Resto written assessment',
            'Resto role play - Lumina',
            'Resto role play - Element',
            'CRM training',
            'Documentation (SFDC ticketing)'
          ]
        },
        11: {
          invisalign: [
            'Resto clinical webinar',
            'E-learning module 6'
          ],
          itero: [
            'Lab training webinar',
            'Design suite webinar',
            'Design suite Hands-on'
          ]
        },
        12: {
          invisalign: [
            'Clinical evidence recording',
            'Soft skills review'
          ],
          itero: [
            'Publication'
          ]
        }
      }
    };
let taskStates = JSON.parse(localStorage.getItem('taskStates')) || {};
    let currentTab = 'pre-boarding';
    let currentWeek = { 'month-1': 1, 'month-2': 5, 'month-3': 9 };

    const GOOGLE_SHEET_URL = 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE'; // Replace with your actual URL

    function init() {
      renderPreBoarding();
      renderMonthWeeks('month-1', [1, 2, 3, 4]);
      renderMonthWeeks('month-2', [5, 6, 7, 8]);
      renderMonthWeeks('month-3', [9, 10, 11, 12]);
      renderMonthContent('month-1', 1);
      updateAllProgress();
    }

    function renderPreBoarding() {
      const container = document.getElementById('pre-boarding-tasks');
      const tasks = taskData['pre-boarding'].invisalign;
      container.innerHTML = tasks.map((task, i) => renderTaskCard(`pre-boarding-${i}`, task)).join('');
    }

    function renderMonthWeeks(month, weeks) {
      const container = document.getElementById(`${month}-weeks`);
      container.innerHTML = weeks.map(week => {
        const active = currentWeek[month] === week ? 'active' : '';
        return `<div class="week-btn ${active}" onclick="selectWeek('${month}', ${week})">Week ${week}</div>`;
      }).join('');
    }

    function renderMonthContent(month, week) {
      const container = document.getElementById(`${month}-content`);
      const weekData = taskData[month][week];
      if (!weekData) {
        container.innerHTML = '<div class="empty-state">No tasks for this week</div>';
        return;
      }

      let html = '';
      ['invisalign', 'itero'].forEach(type => {
        if (weekData[type] && weekData[type].length > 0) {
          html += `<div class="task-section"><h3>${type === 'invisalign' ? '💎 Invisalign' : '📱 iTero'}</h3><div class="task-list">`;
          weekData[type].forEach((task, i) => {
            const id = `${month}-week${week}-${type}-${i}`;
            html += renderTaskCard(id, task);
          });
          html += '</div></div>';
        }
      });

      container.innerHTML = html;
    }

    function renderTaskCard(id, name) {
      const state = taskStates[id] || {};
      const completed = state.completed ? 'completed' : '';
      const checked = state.completed ? 'checked' : '';
      const timestamp = state.timestamp ? `<div class="task-timestamp">✓ Completed: ${formatTimestamp(state.timestamp)}</div>` : '';
      return `
        <div class="task-card ${completed}" onclick="toggleTask('${id}', '${name}')">
          <div class="task-content">
            <div class="checkbox ${checked}"></div>
            <div class="task-info">
              <div class="task-name">${name}</div>
              ${timestamp}
            </div>
          </div>
        </div>`;
    }

    function toggleTask(id, name) {
      const current = taskStates[id] || {};
      const now = new Date().toISOString();
      const newState = {
        completed: !current.completed,
        timestamp: !current.completed ? now : null
      };
      taskStates[id] = newState;
      localStorage.setItem('taskStates', JSON.stringify(taskStates));
      if (currentTab === 'pre-boarding') {
        renderPreBoarding();
      } else {
        renderMonthContent(currentTab, currentWeek[currentTab]);
      }
      updateAllProgress();
      syncToGoogleSheets(id, name, newState);
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
    }

    function selectWeek(month, week) {
      currentWeek[month] = week;
      renderMonthWeeks(month, Object.keys(taskData[month]).map(Number));
      renderMonthContent(month, week);
    }

    function updateAllProgress() {
      const total = getTotalTasks();
      const done = getCompletedTasks();
      const percent = total ? Math.round((done / total) * 100) : 0;
      updateProgressBar('overall-progress', percent);
      document.getElementById('overall-percent').textContent = `${percent}%`;
      renderWeekProgressCards();
    }

    function getTotalTasks() {
      let count = 0;
      Object.keys(taskData).forEach(month => {
        if (month === 'pre-boarding') {
          count += taskData[month].invisalign.length;
        } else {
          Object.values(taskData[month]).forEach(week => {
            ['invisalign', 'itero'].forEach(type => {
              count += week[type]?.length || 0;
            });
          });
        }
      });
      return count;
    }

    function getCompletedTasks() {
      return Object.values(taskStates).filter(t => t.completed).length;
    }

    function updateProgressBar(id, percent) {
      const bar = document.getElementById(id);
      if (!bar) return;
      bar.style.width = `${percent}%`;
      const text = bar.querySelector('.progress-text');
      if (text) text.textContent = `${percent}%`;
      if (percent === 100) {
        bar.classList.add('completed');
      } else {
        bar.classList.remove('completed');
      }
    }

    function renderWeekProgressCards() {
      const container = document.getElementById('week-progress-cards');
      let html = '';
      for (let week = 1; week <= 12; week++) {
        const month = week <= 4 ? 'month-1' : week <= 8 ? 'month-2' : 'month-3';
        const weekData = taskData[month][week];
        if (!weekData) continue;
        let total = 0, done = 0;
        ['invisalign', 'itero'].forEach(type => {
          weekData[type]?.forEach((task, i) => {
            const id = `${month}-week${week}-${type}-${i}`;
            total++;
            if (taskStates[id]?.completed) done++;
          });
        });
        const percent = total ? Math.round((done / total) * 100) : 0;
        html += `
          <div class="week-progress-card">
            <h4>Week ${week} - ${percent}%</h4>
            <div class="mini-progress">
              <div class="mini-progress-bar" style="width: ${percent}%"></div>
            </div>
          </div>`;
      }
      container.innerHTML = html;
    }

    function formatTimestamp(ts) {
      const d = new Date(ts);
      return d.toLocaleString();
    }

    function syncToGoogleSheets(id, name, state) {
      if (GOOGLE_SHEET_URL === 'https://docs.google.com/spreadsheets/d/1m_yDg5QyvYq9MWJuTFEV0fWH_2hMuOAlEr7UhYsOZmo/edit?gid=0#gid=0') return;
      const syncStatus = document.getElementById('sync-status');
      syncStatus.classList.add('show');
      fetch(GOOGLE_SHEET_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          taskId: id,
          taskName: name,
          status: state.completed ? 'Completed' : 'Not Completed',
          timestamp: state.timestamp || ''
        })
      }).finally(() => {
        setTimeout(() => syncStatus.classList.remove('show'), 2000);
      });
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
