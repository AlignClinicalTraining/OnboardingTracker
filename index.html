<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clinical Onboarding Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --align-blue: #0056A3;
      --align-light-blue: #E6F2FF;
      --completed-green: #4CAF50;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f7fa;
      padding-bottom: 60px;
    }

    .header {
      background: linear-gradient(135deg, var(--align-blue) 0%, #003d7a 100%);
      color: white;
      padding: 20px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Progress Dashboard */
    .dashboard {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--card-shadow);
    }

    .dashboard h2 {
      font-size: 20px;
      color: var(--align-blue);
      margin-bottom: 20px;
    }

    .progress-section {
      margin-bottom: 24px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
      color: #333;
      font-weight: 500;
    }

    .progress-bar-container {
      width: 100%;
      height: 24px;
      background: #e9ecef;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--align-blue) 0%, #0076d6 100%);
      border-radius: 12px;
      transition: width 0.4s ease;
      position: relative;
    }

    .progress-bar.completed {
      background: linear-gradient(90deg, var(--completed-green) 0%, #66BB6A 100%);
    }

    .progress-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 12px;
      font-weight: 600;
    }

    .sub-progress {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .week-progress-card {
      background: var(--align-light-blue);
      padding: 12px;
      border-radius: 8px;
    }

    .week-progress-card h4 {
      font-size: 13px;
      color: var(--align-blue);
      margin-bottom: 8px;
    }

    .mini-progress {
      height: 8px;
      background: white;
      border-radius: 4px;
      overflow: hidden;
    }

    .mini-progress-bar {
      height: 100%;
      background: var(--align-blue);
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .tab {
      background: white;
      border: 2px solid #e0e0e0;
      padding: 12px 24px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      color: #666;
      transition: all 0.3s ease;
      white-space: nowrap;
      box-shadow: var(--shadow);
    }

    .tab.active {
      background: var(--align-blue);
      color: white;
      border-color: var(--align-blue);
    }

    /* Week Picker */
    .week-picker {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding: 12px;
      background: white;
      border-radius: 12px;
      box-shadow: var(--shadow);
    }

    .week-btn {
      background: white;
      border: 2px solid var(--align-blue);
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      color: var(--align-blue);
      transition: all 0.3s ease;
      white-space: nowrap;
      min-width: 80px;
      text-align: center;
    }

    .week-btn.active {
      background: var(--align-blue);
      color: white;
    }

    /* Task Tables */
    .task-section {
      margin-bottom: 24px;
    }

    .task-section h3 {
      background: var(--align-blue);
      color: white;
      padding: 12px 16px;
      border-radius: 12px 12px 0 0;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .task-list {
      background: white;
      border-radius: 0 0 12px 12px;
      box-shadow: var(--card-shadow);
      overflow: hidden;
    }

    .task-card {
      padding: 16px;
      border-bottom: 1px solid #f0f0f0;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .task-card:last-child {
      border-bottom: none;
    }

    .task-card:hover {
      background: #fafafa;
    }

    .task-card.completed {
      background: #f1f8f4;
    }

    .task-content {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .checkbox {
      width: 24px;
      height: 24px;
      min-width: 24px;
      border: 2px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
      position: relative;
      transition: all 0.3s ease;
    }

    .checkbox.checked {
      background: var(--completed-green);
      border-color: var(--completed-green);
    }

    .checkbox.checked::after {
      content: '✓';
      position: absolute;
      color: white;
      font-size: 18px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .task-info {
      flex: 1;
    }

    .task-name {
      font-size: 15px;
      color: #333;
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .task-timestamp {
      font-size: 12px;
      color: var(--completed-green);
      font-weight: 600;
    }

    .content-section {
      display: none;
    }

    .content-section.active {
      display: block;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 12px;
      }

      .header h1 {
        font-size: 20px;
      }

      .tab {
        padding: 10px 16px;
        font-size: 14px;
      }

      .dashboard {
        padding: 16px;
      }

      .sub-progress {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🦷 Clinical Onboarding Tracker</h1>
    <p>Your 90-Day Learning Journey</p>
  </div>

  <div class="container">
    <!-- Progress Dashboard -->
    <div class="dashboard">
      <h2>📊 Progress Dashboard</h2>
      <!-- Progress bars will go here -->
